
<!DOCTYPE html>
<html>
<head>
    <title>SafeRide App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        #map {
            height: 400px;
            margin-top: 10px;
        }

        input, button {
            padding: 10px;
            margin: 5px;
        }
    </style>
</head>

<body>

<h2>🚌 SafeRide App</h2>

<input type="text" id="searchBox" placeholder="Enter destination">
<button onclick="searchLocation()">🔍 Search</button><br>

<input type="text" id="familyNumber" placeholder="Enter family phone number"><br>

<button onclick="startGPS()">📍 Start GPS</button>
<button onclick="sendEmergency()">🚨 SOS</button>
<button onclick="callFamily()">📞 Call</button>

<p id="location">📍 Location: Not started</p>
<p id="status"></p>
<p id="distance"></p>

<div id="map"></div>

<!-- JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([17.385044, 78.486671], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
}).addTo(map);

let currentLat, currentLon;
let userMarker, destMarker;

// ✅ Load saved phone number
window.onload = function() {
    document.getElementById("familyNumber").value =
        localStorage.getItem("family") || "";
};
// ✅ GPS Tracking
function startGPS() {
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(position => {
            currentLat = position.coords.latitude;
            currentLon = position.coords.longitude;

            document.getElementById("location").innerHTML =
                `📍 Location: ${currentLat}, ${currentLon}`;

            if (userMarker) map.removeLayer(userMarker);

            userMarker = L.marker([currentLat, currentLon]).addTo(map)
                .bindPopup("You are here").openPopup();
        
  map.setView([currentLat, currentLon], 14);
        });
    } else {
        alert("GPS not supported");
    }
}

// ✅ Search Location
function searchLocation() {
    const location = document.getElementById("searchBox").value.trim();

    if (!location) {
        alert("Enter location");
        return;
    }

    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${location}`)
        .then(res => res.json())
        .then(data => {
            if (data.length > 0) {
                const lat = data[0].lat;
                const lon = data[0].lon;

                document.getElementById("status").innerHTML = "✅ Location found";

                if (destMarker) map.removeLayer(destMarker);

                destMarker = L.marker([lat, lon]).addTo(map)
                    .bindPopup("Destination").openPopup();

                map.setView([lat, lon], 14);

// ✅ Distance + Time
function calculateDistance(destLat, destLon) {
    if (!currentLat) return;

    const R = 6371;
    const dLat = (destLat - currentLat) * Math.PI / 180;
    const dLon = (destLon - currentLon) * Math.PI / 180;

    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(currentLat * Math.PI / 180) *
        Math.cos(destLat * Math.PI / 180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    const distance = R * c;

    let speed = 30; // km/h
    let time = Math.round((distance / speed) * 60);

    document.getElementById("distance").innerHTML =
        `🛣 Distance: ${distance.toFixed(2)} km <br>⏱ Time: ${time} mins`;
}

// ✅ Route Line
function drawRoute(destLat, destLon) {
    if (!currentLat) return;

    if (routeLine) map.removeLayer(routeLine);

    routeLine = L.polyline([
        [currentLat, currentLon],
        [destLat, destLon]
    ], { color: 'blue' }).addTo(map);
}
  
// ✅ SOS
function sendEmergency() {
    const phone = document.getElementById("familyNumber").value;

    if (!phone) {
        alert("Enter phone number");
        return;
    }

    // ✅ Save number
    localStorage.setItem("family", phone);

    const msg =
        `🚨 EMERGENCY!\nI need help.\nLocation:\nhttps://maps.google.com/?q=${currentLat},${currentLon}`;

    window.location.href = `sms:${phone}?body=${encodeURIComponent(msg)}`;

    setTimeout(() => {
        window.location.href = `tel:${phone}`;
    }, 3000);
}

// ✅ Call
function callFamily() {
    const phone = document.getElementById("familyNumber").value;
    window.location.href = `tel:${phone}`;
}

// ✅ Auto alert every 5 mins
function autoAlert() {
    setInterval(() => {
        if (currentLat) {
            sendEmergency();
        }
    }, 300000);
}

// ✅ Alarm
function playAlarm() {
    let audio = new Audio("https://www.soundjay.com/button/beep-07.wav");
    audio.play();
}
        

</script>

</body>
</html>
