<script>
let map = L.map('map').setView([20, 78], 5);
let marker;
let map = L.map('map').setView([17.385044, 78.486671], 12);

// ✅ Map tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
}).addTo(map);

// ✅ Start GPS tracking
function startTracking() {
  navigator.geolocation.watchPosition(pos => {
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;
let currentLat, currentLon;
let userMarker, destMarker;

// ✅ GPS Tracking
function startGPS() {
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(position => {
            currentLat = position.coords.latitude;
            currentLon = position.coords.longitude;

            document.getElementById("location").innerHTML =
                `📍 Location: ${currentLat}, ${currentLon}`;

    map.setView([lat, lon], 15);
            if (userMarker) map.removeLayer(userMarker);

    if (!marker) {
      marker = L.marker([lat, lon]).addTo(map);
            userMarker = L.marker([currentLat, currentLon]).addTo(map)
                .bindPopup("You are here").openPopup();
        
  map.setView([currentLat, currentLon], 14);
        });
    } else {
      marker.setLatLng([lat, lon]);
        alert("GPS not supported");
    }

    document.getElementById("info").innerText =
      `📍 Location: ${lat}, ${lon}`;
  });
}

// ✅ Search Location
function searchLocation() {
    const location = document.getElementById("searchBox").value.trim();

function calculateDistance(lat1, lon1, lat2, lon2) {
  const R = 6371; // Earth radius in km
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
    if (!location) {
        alert("Enter location");
        return;
    }

  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) *
    Math.sin(dLon / 2);
    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${location}`)
        .then(res => res.json())
        .then(data => {
            if (data.length > 0) {
                const lat = data[0].lat;
                const lon = data[0].lon;

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}
                document.getElementById("status").innerHTML = "✅ Location found";

// ✅ Search + Distance + Time
                if (destMarker) map.removeLayer(destMarker);

function searchLocation() {
  let place = document.getElementById("destination").value;

  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${place}`)
    .then(res => res.json())
    .then(data => {
      let destLat = parseFloat(data[0].lat);
      let destLon = parseFloat(data[0].lon);

      L.marker([destLat, destLon]).addTo(map);
      map.setView([destLat, destLon], 13);

      // ✅ Important check
      if (marker) {
        let userLat = marker.getLatLng().lat;
        let userLon = marker.getLatLng().lng;

        let dist = calculateDistance(userLat, userLon, destLat, destLon);
        let time = (dist / 40) * 60; // minutes

        document.getElementById("distance").innerHTML =
          "📏 Distance: " + dist.toFixed(2) + " km | ⏱ Time: " + time.toFixed(0) + " mins";
      } else {
        document.getElementById("distance").innerHTML =
          "⚠️ Please click 'Start GPS' first";
      }
    })
    .catch(() => {
      document.getElementById("distance").innerHTML =
        "❌ Location not found";
    });
                destMarker = L.marker([lat, lon]).addTo(map)
                    .bindPopup("Destination").openPopup();

                map.setView([lat, lon], 14);

                // ✅ Calculate distance
                calculateDistance(lat, lon);

            } else {
                document.getElementById("status").innerHTML = "❌ Location not found";
            }
        });
}

// ✅ Distance Calculation
function calculateDistance(destLat, destLon) {
    if (!currentLat || !currentLon) {
        document.getElementById("distance").innerHTML = "Start GPS first";
        return;
    }

// ✅ SOS SMS
    const R = 6371; // km
    const dLat = (destLat - currentLat) * Math.PI / 180;
    const dLon = (destLon - currentLon) * Math.PI / 180;

    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(currentLat * Math.PI / 180) *
        Math.cos(destLat * Math.PI / 180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    const distance = R * c;

    document.getElementById("distance").innerHTML =
        `🛣 Distance: ${distance.toFixed(2)} km`;
}

// ✅ SOS (Message + Call)
function sendEmergency() {
  let number = document.getElementById("familyNumber").value;
    const phone = document.getElementById("familyNumber").value;

  if (!number) {
    alert("⚠️ Enter family number");
    return;
  }
    if (!phone) {
        alert("Enter phone number");
        return;
    }

    if (!currentLat || !currentLon) {
        alert("GPS not ready");
        return;
    }

  let message = "🚨 Emergency! I need help. Please contact me.";
    const message =
        `🚨 EMERGENCY! I need help.\nMy Location:\nhttps://maps.google.com/?q=${currentLat},${currentLon}`;

  window.location.href = `sms:${number}?body=${encodeURIComponent(message)}`;
    window.location.href = `sms:${phone}?body=${encodeURIComponent(message)}`;

    setTimeout(() => {
        window.location.href = `tel:${phone}`;
    }, 3000);
}

// ✅ Call function
function callFamily() {
  let number = document.getElementById("familyNumber").value;
    const phone = document.getElementById("familyNumber").value;

  if (!number) {
    alert("⚠️ Enter family number");
    return;
  }
    if (!phone) {
        alert("Enter phone number");
        return;
    }

  window.location.href = `tel:${number}`;
    window.location.href = `tel:${phone}`;
}
