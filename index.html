
<!DOCTYPE html>
<html>
<head>
  <title>SafeRide App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ✅ Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { font-family: Arial; text-align: center; }
    #map { height: 400px; margin-top: 10px; }
    button { padding: 10px; margin: 5px; }
    input { padding: 8px; }
  </style>
</head>

<body>

<h2>🚍 SafeRide App</h2>

<!-- ✅ Destination -->
<input type="text" id="destination" placeholder="Enter destination">
<button onclick="searchLocation()">🔍 Search</button>

<br>

<!-- ✅ Family number -->
<input type="text" id="familyNumber" placeholder="Enter family phone number">

<br>

<button onclick="startTracking()">📍 Start GPS</button>
<button onclick="sendEmergency()">🚨 SOS</button>
<button onclick="callFamily()">📞 Call</button>

<p id="info"></p>
<p id="distance"></p>

<div id="map"></div>

<!-- ✅ Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([20, 78], 5);
let marker;

// ✅ Map tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
}).addTo(map);

// ✅ Start GPS tracking
function startTracking() {
  navigator.geolocation.watchPosition(pos => {
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    map.setView([lat, lon], 15);

    if (!marker) {
      marker = L.marker([lat, lon]).addTo(map);
    } else {
      marker.setLatLng([lat, lon]);
    }

    document.getElementById("info").innerText =
      `📍 Location: ${lat}, ${lon}`;
  });
}

// ✅ Distance formula

function calculateDistance(lat1, lon1, lat2, lon2) {
  const R = 6371; // Earth radius in km
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) *
    Math.sin(dLon / 2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

// ✅ Search + Distance + Time

function searchLocation() {
  let place = document.getElementById("destination").value;

  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${place}`)
    .then(res => res.json())
    .then(data => {
      let destLat = parseFloat(data[0].lat);
      let destLon = parseFloat(data[0].lon);

      L.marker([destLat, destLon]).addTo(map);
      map.setView([destLat, destLon], 13);

      // ✅ Important check
      if (marker) {
        let userLat = marker.getLatLng().lat;
        let userLon = marker.getLatLng().lng;

        let dist = calculateDistance(userLat, userLon, destLat, destLon);
        let time = (dist / 40) * 60; // minutes

        document.getElementById("distance").innerHTML =
          "📏 Distance: " + dist.toFixed(2) + " km | ⏱ Time: " + time.toFixed(0) + " mins";
      } else {
        document.getElementById("distance").innerHTML =
          "⚠️ Please click 'Start GPS' first";
      }
    })
    .catch(() => {
      document.getElementById("distance").innerHTML =
        "❌ Location not found";
    });
}


// ✅ SOS SMS
function sendEmergency() {
  let number = document.getElementById("familyNumber").value;

  if (!number) {
    alert("⚠️ Enter family number");
    return;
  }

  let message = "🚨 Emergency! I need help. Please contact me.";

  window.location.href = `sms:${number}?body=${encodeURIComponent(message)}`;
}

// ✅ Call
function callFamily() {
  let number = document.getElementById("familyNumber").value;

  if (!number) {
    alert("⚠️ Enter family number");
    return;
  }

  window.location.href = `tel:${number}`;
}


</script>

</body>
</html>
